project:
  name: "MiniMax-01-Unofficial"
  paper: "MiniMax-01: Scaling Foundation Models with Lightning Attention"
  arxiv: "2501.08313"
  task: "llm"

model:
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  vocab_size: 32768
  moe_experts: 4

training:
  seed: 42
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.01
  max_steps: 100000

paths:
  train: data/train
  val: data/val
  test: data/test
  checkpoints: checkpoints
  outputs: outputs
